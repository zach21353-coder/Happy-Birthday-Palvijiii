<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Palvijiii 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Background decorations -->
        <div class="background-flowers">
            <div class="flower lily"></div>
            <div class="flower lotus"></div>
            <div class="flower sunflower"></div>
        </div>

        <!-- Main content -->
        <div class="content">
            <!-- Cute couple bears -->
            <div class="bears-container">
                <div class="bear bear-left">
                    <div class="bear-head">
                        <div class="ear ear-left"></div>
                        <div class="ear ear-right"></div>
                        <div class="eyes">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                        </div>
                        <div class="nose"></div>
                    </div>
                    <div class="bear-body"></div>
                </div>
                <div class="heart-between">💕</div>
                <div class="bear bear-right">
                    <div class="bear-head">
                        <div class="ear ear-left"></div>
                        <div class="ear ear-right"></div>
                        <div class="eyes">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                        </div>
                        <div class="nose"></div>
                    </div>
                    <div class="bear-body"></div>
                </div>
            </div>

            <!-- Happy Birthday Text -->
            <h1 class="birthday-text">Happy Birthday Palvijiii! 🎉</h1>

            <!-- Music Player -->
            <div class="music-player">
                <button id="playPauseBtn" class="play-pause-btn">
                    <span class="play-icon">▶</span>
                </button>
                <audio id="birthdayAudio" src="birthday-song.mp3"></audio>
                <div class="music-info">🎵 Birthday Song 🎵</div>
            </div>

            <!-- Gift Box -->
            <div class="gift-container">
                <div class="gift-box" id="giftBox">
                    <div class="gift-top">
                        <div class="bow"></div>
                        <div class="bow-knot"></div>
                    </div>
                    <div class="gift-body">🎁</div>
                </div>
                <div class="gift-label">Click the Gift!</div>
            </div>
        </div>

        <!-- Proposal Modal -->
        <div class="modal" id="proposalModal">
            <div class="modal-content">
                <button class="close-btn" id="closeModal">&times;</button>
                <div class="proposal-scene">
                    <div class="proposal-guy">
                        <div class="guy-head">
                            <div class="guy-hair"></div>
                            <div class="guy-face"></div>
                        </div>
                        <div class="guy-body">
                            <div class="guy-arms"></div>
                        </div>
                        <div class="guy-legs"></div>
                        <div class="ring-box">
                            <div class="flowers-bouquet">
                                <span class="flower-emoji">🌸</span>
                                <span class="flower-emoji">🌸</span>
                                <span class="flower-emoji">🌺</span>
                            </div>
                        </div>
                    </div>
                    <div class="proposal-text">
                        <h2>Will You Marry Me? 💍</h2>
                        <p>With all my love and this bouquet of lotus flowers...</p>
                    </div>
                </div>
                <div class="confetti" id="confetti"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
